name: Next.js CI/CD

on:
  push:
    branches: [aws_deployment]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_FRONTEND }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ secrets.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}

      - name: Update ECS task definition and deploy
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_FRONTEND_TASK_DEFINITION }} \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "${{ secrets.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}" \
            --arg DB_URL "${{ secrets.DATABASE_URL }}" \
            --arg AUTH_SECRET "${{ secrets.BETTER_AUTH_SECRET }}" \
            --arg GOOGLE_ID "${{ secrets.GOOGLE_CLIENT_ID }}" \
            --arg GOOGLE_SECRET "${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --arg GITHUB_ID "${{ secrets.GITHUB_CLIENT_ID }}" \
            --arg GITHUB_SECRET "${{ secrets.GITHUB_CLIENT_SECRET }}" \
            --arg API_SECRET "${{ secrets.API_SECRET_KEY }}" \
            '.containerDefinitions[0].image = $IMAGE |
            .containerDefinitions[0].environment = [
                {"name": "DATABASE_URL", "value": $DB_URL},
                {"name": "BETTER_AUTH_SECRET", "value": $AUTH_SECRET},
                {"name": "GOOGLE_CLIENT_ID", "value": $GOOGLE_ID},
                {"name": "GOOGLE_CLIENT_SECRET", "value": $GOOGLE_SECRET},
                {"name": "GITHUB_CLIENT_ID", "value": $GITHUB_ID},
                {"name": "GITHUB_CLIENT_SECRET", "value": $GITHUB_SECRET},
                {"name": "API_SECRET_KEY", "value": $API_SECRET}
                ] |
                del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition revision
          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update service with new task definition
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --service ${{ secrets.ECS_FRONTEND_SERVICE_NAME }} \
            --task-definition $NEW_REVISION
