name: Deploy Next.js to Azure App Service
on:
  push:
    branches: [ main ]  # Changed from 'master' to 'main'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'  # Updated to match your Node 22 preference
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Next.js
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: "http://cpsy300-backend-alb-355541218.us-east-2.elb.amazonaws.com"
    
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: a2-webapp-gtcrheh4byc0gsbh  # Your exact app name
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .
