name: Deploy Next.js to Azure App Service
on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: a2-webapp-gtcrheh4byc0gsbh
  NODE_VERSION: "22.x" # Updated from 20.x

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install ALL dependencies & Build
        env:
          NEXT_PUBLIC_API_URL: "http://cpsy300-backend-alb-355541218.us-east-2.elb.amazonaws.com"
        run: |
          npm ci  # Installs devDependencies (tailwindcss)
          npm run build

      - name: Deploy to Azure Web App (PRE-BUILT)
        uses: azure/webapps-deploy@v3
        with:
          app-name: a2-webapp-gtcrheh4byc0gsbh
          package: .
        env:
          SCM_DO_BUILD_DURING_DEPLOYMENT: false

      - name: Logout
        if: always()
        run: az logout
        continue-on-error: true
