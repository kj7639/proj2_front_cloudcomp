name: Deploy to Azure
on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  test-login:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    
    - name: Verify Login
      run: az account show
      
    - name: Logout
      run: az logout
